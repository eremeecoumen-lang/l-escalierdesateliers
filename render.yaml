services:
  - type: web
    name: archives-textuelles
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: archives-textuelles-data
      mountPath: /var/data
      sizeGB: 1
